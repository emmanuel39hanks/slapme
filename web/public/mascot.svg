<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <defs>
    <!-- Skin gradient for depth -->
    <radialGradient id="skin" cx="0.45" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#f5c5a3"/>
      <stop offset="60%" stop-color="#e8a87c"/>
      <stop offset="100%" stop-color="#d4956a"/>
    </radialGradient>
    <!-- Slap cheek flush -->
    <radialGradient id="slapMark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e84040" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#e84040" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e84040" stop-opacity="0"/>
    </radialGradient>
    <!-- Left cheek blush -->
    <radialGradient id="blushL" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e8836a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e8836a" stop-opacity="0"/>
    </radialGradient>
    <!-- Lip gradient -->
    <linearGradient id="lip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4616b"/>
      <stop offset="100%" stop-color="#b8444f"/>
    </linearGradient>
    <!-- Hair gradient -->
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <!-- Forehead shadow -->
    <linearGradient id="foreheadShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <!-- Nose shadow -->
    <linearGradient id="noseShadow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#c8845e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#b07050" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="100" cy="210" rx="42" ry="6" fill="#d4d4d4" opacity="0.5"/>

  <!-- Neck -->
  <rect x="82" y="160" width="36" height="30" rx="8" fill="url(#skin)"/>
  <rect x="82" y="160" width="36" height="12" rx="0" fill="#c88a65" opacity="0.15"/>

  <!-- Ear left -->
  <ellipse cx="38" cy="108" rx="12" ry="18" fill="#e0a07a"/>
  <ellipse cx="38" cy="108" rx="7" ry="12" fill="#d4956a" opacity="0.5"/>

  <!-- Ear right -->
  <ellipse cx="162" cy="108" rx="12" ry="18" fill="#e0a07a"/>
  <ellipse cx="162" cy="108" rx="7" ry="12" fill="#d4956a" opacity="0.5"/>

  <!-- Head shape -->
  <ellipse cx="100" cy="100" rx="62" ry="72" fill="url(#skin)"/>

  <!-- Forehead shadow from hair -->
  <ellipse cx="100" cy="52" rx="56" ry="20" fill="url(#foreheadShadow)"/>

  <!-- Hair -->
  <path d="M38 75 Q38 22 100 18 Q162 22 162 75 Q155 45 100 40 Q45 45 38 75 Z" fill="url(#hair)"/>
  <!-- Hair top volume -->
  <path d="M42 60 Q45 15 100 10 Q155 15 158 60 Q150 30 100 25 Q50 30 42 60 Z" fill="#222"/>
  <!-- Side hair texture lines -->
  <path d="M45 68 Q48 50 60 42" stroke="#333" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M50 72 Q54 52 68 44" stroke="#333" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M155 68 Q152 50 140 42" stroke="#333" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M150 72 Q146 52 132 44" stroke="#333" stroke-width="0.8" fill="none" opacity="0.3"/>

  <!-- SLAP MARK on right cheek -->
  <ellipse cx="145" cy="115" rx="24" ry="20" fill="url(#slapMark)"/>
  <!-- Finger mark lines -->
  <path d="M134 105 Q140 108 135 118" stroke="#e84040" stroke-width="1.2" fill="none" opacity="0.2" stroke-linecap="round"/>
  <path d="M138 103 Q144 107 140 116" stroke="#e84040" stroke-width="1.2" fill="none" opacity="0.18" stroke-linecap="round"/>
  <path d="M142 102 Q148 106 145 115" stroke="#e84040" stroke-width="1" fill="none" opacity="0.15" stroke-linecap="round"/>

  <!-- Left cheek natural blush -->
  <ellipse cx="60" cy="118" rx="16" ry="10" fill="url(#blushL)"/>

  <!-- Left eyebrow - raised (surprised) -->
  <path d="M62 72 Q75 62 88 68" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Right eyebrow - furrowed (ouch) -->
  <path d="M112 70 Q122 64 136 68" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Left eye - wide open (shocked) -->
  <ellipse cx="75" cy="90" rx="12" ry="13" fill="white"/>
  <ellipse cx="75" cy="90" rx="12" ry="13" stroke="#c8845e" stroke-width="0.5" opacity="0.3"/>
  <!-- Iris -->
  <circle cx="77" cy="91" r="7" fill="#3d2314"/>
  <circle cx="77" cy="91" r="4.5" fill="#1a0e08"/>
  <!-- Pupil highlight -->
  <circle cx="79" cy="88" r="2" fill="white" opacity="0.9"/>
  <circle cx="75" cy="93" r="1" fill="white" opacity="0.4"/>
  <!-- Upper eyelid crease -->
  <path d="M63 82 Q75 77 87 82" stroke="#c08060" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- Lower lash line -->
  <path d="M64 96 Q75 100 86 96" stroke="#2a2a2a" stroke-width="0.8" fill="none" opacity="0.3"/>
  <!-- Upper lashes -->
  <path d="M63 85 Q75 80 87 85" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Right eye - squinting (pain) -->
  <ellipse cx="125" cy="90" rx="12" ry="10" fill="white"/>
  <ellipse cx="125" cy="90" rx="12" ry="10" stroke="#c8845e" stroke-width="0.5" opacity="0.3"/>
  <!-- Iris -->
  <circle cx="126" cy="91" r="6" fill="#3d2314"/>
  <circle cx="126" cy="91" r="4" fill="#1a0e08"/>
  <!-- Pupil highlight -->
  <circle cx="128" cy="89" r="1.8" fill="white" opacity="0.9"/>
  <!-- Upper eyelid crease -->
  <path d="M113 84 Q125 80 137 84" stroke="#c08060" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- Squint - lower lid pushed up -->
  <path d="M114 95 Q125 98 136 95" stroke="#d4956a" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Upper lashes -->
  <path d="M113 86 Q125 82 137 86" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M97 95 Q94 110 90 118 Q95 122 100 122 Q105 122 110 118 Q106 110 103 95" fill="url(#noseShadow)" opacity="0.4"/>
  <!-- Nose tip -->
  <ellipse cx="100" cy="118" rx="7" ry="4" fill="#d4956a" opacity="0.25"/>
  <!-- Nostril hints -->
  <ellipse cx="94" cy="119" rx="3" ry="2" fill="#b07050" opacity="0.25"/>
  <ellipse cx="106" cy="119" rx="3" ry="2" fill="#b07050" opacity="0.25"/>
  <!-- Nose bridge highlight -->
  <path d="M98 96 Q100 105 100 114" stroke="#f5d5b8" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- MOUTH - biting bottom lip -->
  <!-- Upper lip -->
  <path d="M82 134 Q91 131 100 133 Q109 131 118 134" fill="#c8506a" stroke="#b44458" stroke-width="0.5"/>
  <!-- Cupid's bow -->
  <path d="M91 133 Q96 130 100 133 Q104 130 109 133" fill="#d4616b"/>

  <!-- Top teeth showing (biting down) -->
  <rect x="86" y="134" width="7" height="5" rx="1" fill="#f8f4f0" stroke="#e0dcd8" stroke-width="0.3"/>
  <rect x="93.5" y="134" width="6" height="5.5" rx="1" fill="#faf6f2" stroke="#e0dcd8" stroke-width="0.3"/>
  <rect x="100" y="134" width="6" height="5.5" rx="1" fill="#faf6f2" stroke="#e0dcd8" stroke-width="0.3"/>
  <rect x="106.5" y="134" width="7" height="5" rx="1" fill="#f8f4f0" stroke="#e0dcd8" stroke-width="0.3"/>

  <!-- Bottom lip - bitten, plump, compressed under teeth -->
  <path d="M84 139.5 Q100 153 116 139.5" fill="url(#lip)"/>
  <!-- Lip shine -->
  <path d="M92 142 Q100 144 108 142" stroke="#e88090" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <!-- Teeth indent on lip -->
  <path d="M88 139.5 L88 141" stroke="#a83845" stroke-width="0.6" opacity="0.3"/>
  <path d="M93.5 139.5 L93.5 141.5" stroke="#a83845" stroke-width="0.6" opacity="0.3"/>
  <path d="M106 139.5 L106 141.5" stroke="#a83845" stroke-width="0.6" opacity="0.3"/>
  <path d="M112 139.5 L112 141" stroke="#a83845" stroke-width="0.6" opacity="0.3"/>

  <!-- Chin -->
  <ellipse cx="100" cy="156" rx="18" ry="6" fill="#d4956a" opacity="0.08"/>
  <!-- Chin clench dimple -->
  <path d="M95 150 Q100 153 105 150" stroke="#c08060" stroke-width="0.8" fill="none" opacity="0.25" stroke-linecap="round"/>

  <!-- Jaw shadow -->
  <path d="M42 120 Q50 158 100 168 Q150 158 158 120" stroke="#b07050" stroke-width="0" fill="#b07050" opacity="0.06"/>

  <!-- Subtle skin texture (pores/freckles) -->
  <circle cx="65" cy="112" r="0.6" fill="#c08060" opacity="0.2"/>
  <circle cx="70" cy="115" r="0.5" fill="#c08060" opacity="0.15"/>
  <circle cx="62" cy="108" r="0.5" fill="#c08060" opacity="0.18"/>
  <circle cx="130" cy="110" r="0.6" fill="#c08060" opacity="0.15"/>
  <circle cx="135" cy="113" r="0.5" fill="#c08060" opacity="0.12"/>
  <circle cx="128" cy="107" r="0.5" fill="#c08060" opacity="0.15"/>
  <circle cx="90" cy="128" r="0.4" fill="#c08060" opacity="0.12"/>
  <circle cx="110" cy="127" r="0.4" fill="#c08060" opacity="0.12"/>

  <!-- Sweat drop -->
  <path d="M52 78 Q49 68 52 62 Q55 68 52 78 Z" fill="#7dc4f5" opacity="0.6"/>
  <ellipse cx="51.5" cy="66" rx="1" ry="1.5" fill="white" opacity="0.7"/>

  <!-- Impact lines from slap -->
  <line x1="165" y1="95" x2="175" y2="90" stroke="#e84040" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="168" y1="105" x2="178" y2="105" stroke="#e84040" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="165" y1="115" x2="175" y2="120" stroke="#e84040" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
</svg>
